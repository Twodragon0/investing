title: "Investing Dragon"
description: "Crypto & Stock News Aggregation and Trading Journal"
url: "https://investing.2twodragon.com"
baseurl: ""
lang: ko
timezone: Asia/Seoul

# Social sharing / SEO
og_image: /assets/images/og-default.png
og_image_width: 1200
og_image_height: 630
logo: /assets/images/og-default.png
author:
  name: Investing Dragon
  url: "https://investing.2twodragon.com"
social:
  name: Investing Dragon
twitter:
  card: summary_large_image
  username: "@InvestingDragon"

theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Feed Settings
feed:
  path: atom.xml
  posts_limit: 30
  excerpt_only: false

permalink: /:categories/:year/:month/:day/:title/

future: true

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "ko"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

strict_front_matter: true

exclude:
  - scripts/
  - _state/
  - .env
  - .env.example
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - docs/
  - _config_ghpages.yml
