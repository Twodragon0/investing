[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "S",     # bandit (security)
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade
    "SIM",   # flake8-simplify
    "T20",   # flake8-print (detect debug prints)
    "DTZ",   # flake8-datetimez
    "PIE",   # flake8-pie
    "PT",    # flake8-pytest-style
    "RET",   # flake8-return
    "TCH",   # flake8-type-checking
]
ignore = [
    "S101",   # assert usage (OK in scripts)
    "S603",   # subprocess call - check for untrusted input
    "S607",   # partial executable path
    "S310",   # suspicious-url-open - URLs from trusted config
    "S314",   # xml parsing - sitemaps are our own trusted build artifacts
    "T201",   # print statement (scripts use print for logging)
    "E501",   # line too long (handled by formatter)
    "RET504", # unnecessary assignment before return
    "RET505", # superfluous else return
    "UP006",  # non-pep585-annotation (modernize later)
    "UP007",  # non-pep604-annotation-union (modernize later)
    "UP035",  # deprecated-import (modernize later)
    "UP045",  # non-pep604-annotation-optional (modernize later)
    # Style rules - suppress for now, address incrementally
    "SIM105", # suppressible-exception (contextlib.suppress)
    "SIM102", # collapsible-if
    "SIM103", # needless-bool
    "SIM108", # if-else-block-instead-of-if-exp
    "SIM113", # enumerate-for-loop
    "C408",   # unnecessary-collection-call
    "PT018",  # pytest-composite-assertion
    "PIE810", # multiple-starts-ends-with
]

[tool.ruff.lint.per-file-ignores]
"scripts/collect_*.py" = ["S113"]   # requests timeout (handled by config.py)
"scripts/generate_*.py" = ["S113"]
"scripts/respond_ai_mentions.py" = ["S113"]
"scripts/common/config.py" = ["S110"]  # intentional fallback pattern
"scripts/verify_rendered_posts.py" = ["S110"]  # intentional fallback pattern

[tool.ruff.lint.isort]
known-first-party = ["common"]

[tool.ruff.format]
quote-style = "double"

[tool.coverage.run]
relative_files = true

[tool.pytest.ini_options]
addopts = "--cov=scripts --cov-fail-under=55"
# 베어 `pytest` 가 Jekyll 빌드 산출물(_site/) 내 복사된 테스트를 수집해
# ImportError 로 깨지던 문제 방지. CI 는 명시적으로 `pytest tests/` 를 호출하므로 영향 없음.
testpaths = ["tests"]
norecursedirs = ["_site", ".git", "node_modules", "vendor", ".bundle"]
# pytest-timeout 'thread' method — signal 기반(default)은 Playwright sync API의
# C extension(GIL hold) 안에서 SIGALRM이 무시되는 케이스가 있어 대기가 무한 연장.
# i18n-e2e CI run 25563884706에서 S3 touch가 22분 행 → workflow timeout.
# thread 방식은 별도 타이머 스레드로 강제 종료해 Playwright wait도 신뢰성 있게 컷.
timeout_method = "thread"
markers = [
    "i18n_e2e: Playwright-driven end-to-end tests for the language toggle (tests/i18n/). Requires a running Jekyll preview at I18N_E2E_BASE_URL.",
]

[tool.basedpyright]
include = ["scripts"]
exclude = ["vendor", ".venv", "_site", "node_modules", "dist", "build"]
# scripts/tools/* 일부는 common/__init__.py의 heavy collector 의존성을 피하기 위해
# `sys.path.insert(scripts/common)` 후 `from config import ...` 패턴을 사용한다.
# basedpyright가 이 sys.path 트릭을 정적 분석하지 못하므로 extraPaths로 동등 경로를 노출.
extraPaths = ["scripts/common"]
typeCheckingMode = "basic"
reportImplicitRelativeImport = "none"
reportMissingTypeArgument = "none"
reportPossiblyUnboundVariable = "none"
reportAssignmentType = "none"
reportArgumentType = "none"
reportConstantRedefinition = "none"
reportGeneralTypeIssues = "none"
