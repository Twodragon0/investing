<!-- Google Translate Widget SDK Integration -->
<button class="lang-toggle" id="lang-toggle" aria-label="언어 변경" aria-expanded="false" aria-controls="lang-dropdown" type="button">
  <svg class="globe-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <circle cx="12" cy="12" r="10"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
  </svg>
  <span class="lang-code notranslate" id="current-lang" translate="no">KO</span>
</button>
<div class="lang-dropdown-overlay" id="lang-dropdown-overlay" aria-hidden="true"></div>
<div class="lang-dropdown notranslate" id="lang-dropdown" translate="no" role="menu" aria-label="언어 선택">
  <div class="lang-ai-badge" aria-hidden="true">Google Translate</div>
  <button class="lang-option" data-lang="ko" title="한국어" role="menuitem">
    <span class="lang-flag">🇰🇷</span>
    <span class="lang-name">한국어</span>
  </button>
  <button class="lang-option" data-lang="en" title="English" role="menuitem">
    <span class="lang-flag">🇺🇸</span>
    <span class="lang-name">English</span>
  </button>
  <button class="lang-option" data-lang="ja" title="日本語" role="menuitem">
    <span class="lang-flag">🇯🇵</span>
    <span class="lang-name">日本語</span>
  </button>
  <button class="lang-option" data-lang="zh-CN" title="简体中文" role="menuitem">
    <span class="lang-flag">🇨🇳</span>
    <span class="lang-name">简体中文</span>
  </button>
  <button class="lang-option" data-lang="es" title="Español" role="menuitem">
    <span class="lang-flag">🇪🇸</span>
    <span class="lang-name">Español</span>
  </button>
</div>
<!-- Hidden Google Translate Element -->
<div id="google_translate_element" style="display:none;"></div>
<!-- Google Translate: pre-loads on hover/focus, lazy-loads on click as fallback -->
<script>
(function() {
  var loaded = false;
  var toggle = document.getElementById('lang-toggle');
  if (!toggle) return;
  var loadTranslate = function() {
    if (loaded) return;
    loaded = true;
    var s = document.createElement('script');
    s.src = '{{ "/assets/js/google-translate.js" | relative_url }}?v={{ site.time | date: "%Y%m%d%H%M" }}';
    s.defer = true;
    document.body.appendChild(s);
  };
  // Pre-load on hover/focus — user intent signal removes click latency
  toggle.addEventListener('mouseenter', loadTranslate, { once: true, passive: true });
  toggle.addEventListener('focusin', loadTranslate, { once: true, passive: true });
  toggle.addEventListener('touchstart', loadTranslate, { once: true, passive: true });
  toggle.addEventListener('click', loadTranslate, { once: true, passive: true });
  // Visual loading state during translation (set on lang-option click)
  document.addEventListener('click', function(e) {
    var opt = e.target.closest && e.target.closest('.lang-option');
    if (opt && opt.getAttribute('data-lang') !== 'ko') {
      document.documentElement.classList.add('translating');
      setTimeout(function(){ document.documentElement.classList.remove('translating'); }, 8000);
    }
  }, { passive: true });
  try {
    var pref = localStorage.getItem('preferredLang');
    if (pref && pref !== 'system' && pref !== 'ko') { loadTranslate(); }
  } catch(e) {}
})();
</script>
<style>
html.translating::after{content:'';position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#3b82f6,transparent);background-size:200% 100%;animation:translating-bar 1.2s linear infinite;z-index:9999;pointer-events:none}
@keyframes translating-bar{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
