<header class="site-header" role="banner">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">🐉 {{ site.title }}</a>
    <nav class="site-nav" id="site-nav" role="navigation" aria-label="메인 네비게이션" data-i18n-aria="main_nav">
      {% for item in site.data.navigation.main %}
        {% if item.children %}
          <div class="nav-dropdown">
            <button class="nav-dropdown-btn" type="button" aria-expanded="false" aria-haspopup="true">
              {{ item.title }}
              <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true"><path d="M2 4l3 3 3-3"/></svg>
            </button>
            <div class="nav-dropdown-menu">
              {% for child in item.children %}
                <a href="{{ child.url | relative_url }}" {% if page.url == child.url %}class="active"{% endif %}>{{ child.title }}</a>
              {% endfor %}
            </div>
          </div>
        {% else %}
          <a href="{{ item.url | relative_url }}" class="nav-link{% if page.url == item.url %} active{% endif %}">{{ item.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>
    <div class="nav-actions">
      <div class="search-toggle-wrapper">
        <button class="search-toggle" aria-label="검색" data-i18n-aria="search_label" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>
      <div class="lang-toggle-wrapper notranslate" translate="no">
        <button class="lang-toggle" id="lang-toggle" aria-label="언어 변경" data-i18n-aria="change_language" aria-expanded="false" aria-controls="lang-dropdown" type="button">
          <svg class="globe-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span class="lang-code notranslate" id="current-lang" translate="no">KO</span>
        </button>
        <div class="lang-dropdown-overlay" id="lang-dropdown-overlay" aria-hidden="true"></div>
        <div class="lang-dropdown notranslate" id="lang-dropdown" translate="no" role="menu" aria-label="언어 선택" data-i18n-aria="select_language">
          <button class="lang-option" data-lang="ko" title="한국어" role="menuitem"><span class="lang-flag">🇰🇷</span><span class="lang-name">한국어</span></button>
          <button class="lang-option" data-lang="en" title="English" role="menuitem"><span class="lang-flag">🇺🇸</span><span class="lang-name">English</span></button>
          <button class="lang-option" data-lang="ja" title="日本語" role="menuitem"><span class="lang-flag">🇯🇵</span><span class="lang-name">日本語</span></button>
          <button class="lang-option" data-lang="zh-CN" title="简体中文" role="menuitem"><span class="lang-flag">🇨🇳</span><span class="lang-name">简体中文</span></button>
          <button class="lang-option" data-lang="es" title="Español" role="menuitem"><span class="lang-flag">🇪🇸</span><span class="lang-name">Español</span></button>
        </div>
        <div id="google_translate_element" style="display:none;"></div>
        {% include google-translate.html %}
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="테마 변경" data-i18n-aria="change_theme" type="button">
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">☰</button>
  </div>
</header>

<!-- Search Overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-overlay-content">
    <div class="search-overlay-header">
      <input type="text" id="search-input" class="search-overlay-input" placeholder="검색어를 입력하세요..." autocomplete="off" data-baseurl="{{ site.baseurl }}" data-i18n-placeholder="search_placeholder">
      <button class="search-overlay-close" aria-label="닫기" data-i18n-aria="close_label">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
</div>

<script>
// Mobile nav toggle
document.querySelector('.nav-toggle').addEventListener('click', function() {
  document.querySelector('.site-nav').classList.toggle('active');
});

// Mobile dropdown toggles
document.querySelectorAll('.nav-dropdown-btn').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    if (window.innerWidth <= 768) {
      e.preventDefault();
      e.stopPropagation();
      this.closest('.nav-dropdown').classList.toggle('open');
      btn.setAttribute('aria-expanded', btn.closest('.nav-dropdown').classList.contains('open'));
    }
  });
});

// Close dropdowns on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-dropdown')) {
    document.querySelectorAll('.nav-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
  }
});

// Search overlay toggle
var searchToggle = document.querySelector('.search-toggle');
var searchOverlay = document.getElementById('search-overlay');
var searchClose = document.querySelector('.search-overlay-close');
var searchInput = document.getElementById('search-input');

if (searchToggle && searchOverlay) {
  searchToggle.addEventListener('click', function() {
    searchOverlay.classList.add('active');
    setTimeout(function() { searchInput.focus(); }, 100);
  });

  searchClose.addEventListener('click', function() {
    searchOverlay.classList.remove('active');
    searchInput.value = '';
    document.getElementById('search-results').textContent = '';
  });

  searchOverlay.addEventListener('click', function(e) {
    if (e.target === searchOverlay) {
      searchOverlay.classList.remove('active');
      searchInput.value = '';
      document.getElementById('search-results').textContent = '';
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
      searchOverlay.classList.remove('active');
      searchInput.value = '';
      document.getElementById('search-results').textContent = '';
    }
  });
}
</script>
