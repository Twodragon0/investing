# ==============================================================================
# 수집기 설정 파일 (collectors.yml)
# 모든 collect_*.py 스크립트의 하드코딩된 상수를 중앙에서 관리합니다.
#
# 구조:
#   global:        모든 수집기에 공통으로 적용되는 기본값
#   <collector>:   수집기별 설정 (global 기본값을 덮어씁니다)
#
# 수정 시 유의사항:
#   - URL 변경 시 실제 API 엔드포인트가 유효한지 반드시 확인하세요
#   - limits 값은 양의 정수여야 합니다
#   - thresholds 값은 0.0~1.0 또는 명시된 범위 내에서 설정하세요
# ==============================================================================

# ──────────────────────────────────────────────────────────────────────────────
# 공통 기본값 (모든 수집기에 적용)
# ──────────────────────────────────────────────────────────────────────────────
global:
  # HTTP 요청 타임아웃 (초)
  request_timeout: 15
  # 퍼지 매칭 최소 점수 (0~100, 중복 판정 임계값)
  fuzzy_match_threshold: 80
  # SSL 인증서 검증 활성화 여부 (DISABLE_SSL_VERIFY 환경변수로 재정의 가능)
  ssl_verify: true
  # 중복 제거 창 (일)
  dedup_window_days: 7


# ──────────────────────────────────────────────────────────────────────────────
# CoinMarketCap / CoinGecko 수집기
# ──────────────────────────────────────────────────────────────────────────────
coinmarketcap:
  # CoinMarketCap API 엔드포인트 (pro-api, API 키 필요)
  urls:
    cmc_listings: "https://pro-api.coinmarketcap.com/v1/cryptocurrency/listings/latest"
    cmc_trending: "https://pro-api.coinmarketcap.com/v1/cryptocurrency/trending/latest"
    cmc_gainers_losers: "https://pro-api.coinmarketcap.com/v1/cryptocurrency/trending/gainers-losers"
    cmc_site: "https://coinmarketcap.com/"
    coingecko_site: "https://www.coingecko.com/"
  limits:
    # 상위 코인 조회 수
    top_coins: 30
    # 트렌딩 코인 조회 수
    trending_coins: 10
    # 상승/하락 코인 조회 수
    gainers_losers: 10
    # 테이블에 표시할 최대 코인 수
    display_top_coins: 20
    # 상승/하락 표시 최대 수
    display_gainers_losers: 5
  # CMC/CoinGecko API는 응답이 느려 기본값(15)보다 길게 설정
  request_timeout: 20
  state_file: "coinmarketcap_posts.json"


# ──────────────────────────────────────────────────────────────────────────────
# DeFi Llama 수집기
# ──────────────────────────────────────────────────────────────────────────────
defi_llama:
  # DeFi Llama 공개 API (API 키 불필요)
  urls:
    base: "https://api.llama.fi"
    protocols_endpoint: "/v2/protocols"
    chains_endpoint: "/v2/chains"
    site: "https://defillama.com"
    protocol_page: "https://defillama.com/protocol/{slug}"
    chains_page: "https://defillama.com/chains"
    api_docs: "https://defillama.com/docs/api"
  limits:
    # 상위 프로토콜 수 (TVL 기준)
    top_protocols: 20
    # 상위 체인 수 (TVL 기준)
    top_chains: 15
  thresholds:
    # TVL이 이 일수 동안 동일하면 데이터 staleness 경고
    tvl_stale_days: 3
  state_file: "defi_llama_posts.json"


# ──────────────────────────────────────────────────────────────────────────────
# 암호화폐 뉴스 수집기
# ──────────────────────────────────────────────────────────────────────────────
crypto_news:
  urls:
    # CryptoPanic API (API 키 선택적)
    cryptopanic: "https://cryptopanic.com/api/v1/posts/"
    # 주요 크립토 미디어 RSS 피드
    rss_coindesk: "https://www.coindesk.com/arc/outboundfeeds/rss"
    rss_cointelegraph: "https://cointelegraph.com/rss"
    rss_decrypt: "https://decrypt.co/feed"
    rss_bitcoin_magazine: "https://bitcoinmagazine.com/.rss/full/"
    rss_theblock: "https://www.theblock.co/rss"
    # Rekt News stopped publishing hack-incident RSS (opinion/research only,
    # 0 incident items since ~2026-04). Swapped to CoinTelegraph's hacks tag
    # feed — incident-focused, refreshed daily. Key kept for backward compat.
    rss_rekt_news: "https://cointelegraph.com/rss/tag/hacks"
    # DeFiLlama hacks API — 정형 익스플로잇 사건(피해액/기법/체인) 데이터.
    # 단일 RSS 피드 의존성을 줄이기 위한 2차 보안 사건 소스.
    defillama_hacks: "https://api.llama.fi/hacks"
    # Google News RSS (영어/한국어)
    google_news_crypto_en: "https://news.google.com/rss/search?q=cryptocurrency&hl=en-US&gl=US&ceid=US:en"
    google_news_crypto_kr: "https://news.google.com/rss/search?q=암호화폐+비트코인&hl=ko&gl=KR&ceid=KR:ko"
    # 보안 관련 Google News RSS
    google_news_security_en: "https://news.google.com/rss/search?q=blockchain+hack+exploit+security&hl=en-US&gl=US&ceid=US:en"
    google_news_defi_security: "https://news.google.com/rss/search?q=crypto+hack+DeFi+exploit&hl=en-US&gl=US&ceid=US:en"
    google_news_security_kr: "https://news.google.com/rss/search?q=블록체인+해킹+보안+취약점&hl=ko&gl=KR&ceid=KR:ko"
    # Google News 브라우저 스크래핑용 검색 URL
    google_news_browser: "https://news.google.com/search?q=cryptocurrency+bitcoin&hl=en-US&gl=US&ceid=US:en"
    # Binance 공지사항
    binance_announcement: "https://www.binance.com/en/support/announcement"
    binance_api: "https://www.binance.com/bapi/composite/v1/public/cms/article/list/query"
    binance_base: "https://www.binance.com"
  limits:
    # CryptoPanic 최대 아이템 수
    cryptopanic_items: 20
    # Google News 브라우저 최대 아이템 수
