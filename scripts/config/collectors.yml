    # Google News RSS (지정학 관련)
    google_news_geo_en: "https://news.google.com/rss/search?q=geopolitical+risk+investment&hl=en&gl=US&ceid=US:en"
    google_news_conflict: "https://news.google.com/rss/search?q=military+conflict+sanctions+war&hl=en&gl=US&ceid=US:en"
