name: 'Python Collect & Commit'
description: 'Setup Python, run a collection script, and commit/push results'

inputs:
  script:
    description: 'Python script to run (e.g. scripts/collect_crypto_news.py)'
    required: true
  commit-message:
    description: 'Commit message prefix (timestamp appended automatically)'
    required: true
  git-add-paths:
    description: 'Paths to git add (space-separated)'
    required: false
    default: '_posts/ _state/'
  install-playwright:
    description: 'Install Playwright browser and deps (true/false)'
    required: false
    default: 'false'
  ssl-strict:
    description: 'Fail job if DISABLE_SSL_VERIFY is enabled (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: scripts/requirements.txt

    - name: Install dependencies
      shell: bash
      run: pip install -r scripts/requirements.txt

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      id: playwright-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

    - name: Install Playwright browsers
      if: inputs.install-playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: python -m playwright install chromium --with-deps

    - name: Install Playwright deps only (cached)
      if: inputs.install-playwright == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: python -m playwright install-deps chromium

    - name: Verify SSL is enabled
      shell: bash
      run: |
        if [ "${DISABLE_SSL_VERIFY:-}" = "true" ] || [ "${DISABLE_SSL_VERIFY:-}" = "1" ]; then
          if [ "${{ inputs.ssl-strict }}" = "true" ]; then
            echo "::error::DISABLE_SSL_VERIFY is set in CI while ssl-strict=true"
            exit 1
          fi
          echo "::warning::DISABLE_SSL_VERIFY is set in CI — SSL verification is disabled!"
        fi

    - name: Mark collection start
      shell: bash
      run: touch /tmp/collect-start-marker

    - name: Install CJK fonts
      shell: bash
      run: |
        if ! fc-list :lang=ko | grep -q .; then
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk >/dev/null 2>&1
        fi

    - name: Run script
      shell: bash
      run: python "${{ inputs.script }}" 2>&1 | tee /tmp/collect-script-output.log; exit "${PIPESTATUS[0]}"

    - name: Notify Slack on entertainment filter metrics
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ env.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL_ID: ${{ env.SLACK_CHANNEL_ID_INVESTING }}
      run: |
        # SLACK_BOT_TOKEN 없으면 skip
        if [ -z "${SLACK_BOT_TOKEN:-}" ]; then
          echo "SLACK_BOT_TOKEN not set — skipping entertainment filter notification"
          exit 0
        fi
        # 채널 미설정 시 skip
        if [ -z "${SLACK_CHANNEL_ID:-}" ]; then
          echo "SLACK_CHANNEL_ID_INVESTING not set — skipping entertainment filter notification"
          exit 0
        fi
        # 로그 파일 없으면 skip
        if [ ! -f /tmp/collect-script-output.log ]; then
          echo "No collect output log found — skipping"
          exit 0
        fi

        # collection-summary 라인에서 엔터테인먼트 필터 메트릭 추출
        SUMMARY_LINE=$(grep 'collection-summary' /tmp/collect-script-output.log | tail -1)
        if [ -z "$SUMMARY_LINE" ]; then
          echo "No collection-summary line found — skipping"
          exit 0
        fi

        FILTERED_COUNT=$(echo "$SUMMARY_LINE" | grep -oP 'entertainment_filtered_count=\K[0-9]+' || true)
        FILTER_RATE=$(echo "$SUMMARY_LINE"   | grep -oP 'entertainment_filter_rate=\K[0-9.]+%' || true)
        COLLECTOR=$(echo "$SUMMARY_LINE"     | grep -oP 'collector=\K\S+' || true)

        # 값이 없거나 0이면 skip (노이즈 방지)
        if [ -z "$FILTERED_COUNT" ] || [ "$FILTERED_COUNT" -eq 0 ] 2>/dev/null; then
          echo "entertainment_filtered_count=0 or absent — skipping notification"
          exit 0
        fi

        RATE_DISPLAY="${FILTER_RATE:-?%}"
        COLLECTOR_DISPLAY="${COLLECTOR:-unknown}"

        MESSAGE="[${COLLECTOR_DISPLAY}] 엔터테인먼트 필터: ${FILTERED_COUNT}건 제거 (${RATE_DISPLAY})"
        echo "Sending Slack notification: $MESSAGE"

        HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
          -X POST https://slack.com/api/chat.postMessage \
          -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
          -H "Content-Type: application/json; charset=utf-8" \
          --data "{\"channel\":\"${SLACK_CHANNEL_ID}\",\"text\":\"${MESSAGE}\"}" || echo "000")

        if [ "$HTTP_STATUS" = "200" ]; then
          echo "Slack notification sent (HTTP $HTTP_STATUS)"
        else
          echo "::warning::Slack notification failed (HTTP $HTTP_STATUS) — non-blocking"
        fi

    - name: Validate collection output
      shell: bash
      run: |
        # Check that at least one post file was generated
        NEW_POSTS=$(find _posts/ -name "*.md" -newer /tmp/collect-start-marker 2>/dev/null | wc -l)
        echo "New posts generated: $NEW_POSTS"
        if [ "$NEW_POSTS" -eq 0 ]; then
          echo "::warning::No new posts were generated by the collection script"
        fi

    - name: Improve quality for newly generated posts
      shell: bash
      run: |
        NEW_POST_FILES=$(find _posts/ -name "*.md" -newer /tmp/collect-start-marker 2>/dev/null)
        if [ -z "$NEW_POST_FILES" ]; then
          echo "No new posts for quality improvement"
          exit 0
        fi
        echo "$NEW_POST_FILES" | xargs python scripts/improve_existing_posts.py --files

    - name: Generate OG images for new posts
      shell: bash
      run: |
        NEW_POST_FILES=$(find _posts/ -name "*.md" -newer /tmp/collect-start-marker 2>/dev/null)
        if [ -z "$NEW_POST_FILES" ]; then
          echo "No new posts for OG image generation"
          exit 0
        fi
        # Extract today's date from the first new post filename
        TODAY=$(echo "$NEW_POST_FILES" | head -1 | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
        if [ -n "$TODAY" ]; then
          python scripts/generate_og_images.py --date "$TODAY" --force --update-frontmatter
        fi

    - name: Commit and push
      shell: bash
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch --no-tags origin main

        for path in ${{ inputs.git-add-paths }}; do
          if [ -e "$path" ]; then
            git add "$path"
          fi
        done

        if git diff --staged --quiet; then
          echo "No new posts to commit"
        else
          git commit -m "${{ inputs.commit-message }} $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== Push attempt $i/$MAX_RETRIES ==="
            if git push origin main 2>&1; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push failed, syncing with remote..."
            DELAY=$((i * 3 + RANDOM % 5))
            echo "Waiting ${DELAY}s before retry..."
            sleep $DELAY
            # Try rebase first (cleaner history)
            if git pull --rebase origin main 2>&1; then
              echo "Rebase succeeded, retrying push..."
              continue
            fi
            # Rebase failed (conflict), resolve and retry
            echo "Rebase failed, resolving conflicts..."
            git rebase --abort 2>/dev/null || true
            # For state files, always accept remote (latest dedup state)
            git pull --no-rebase -X theirs origin main 2>&1 || {
              # If still conflicting, force-resolve remaining conflicts
              for cf in $(git diff --name-only --diff-filter=U 2>/dev/null); do
                case "$cf" in
                  _state/*|*.json)
                    echo "Resolving $cf with remote version (latest state)"
                    git checkout --theirs "$cf" && git add "$cf" ;;
                  _posts/*|assets/*)
                    echo "Resolving $cf with local version (our generation)"
                    git checkout --ours "$cf" && git add "$cf" ;;
                  *)
                    echo "Resolving $cf with local version"
                    git checkout --ours "$cf" && git add "$cf" ;;
                esac
              done
              git -c core.editor=true merge --continue 2>/dev/null || \
                git commit --no-edit 2>/dev/null || \
                echo "::warning::Conflict resolution commit failed; push may be incomplete"
            }
            echo "Conflict resolved, retrying push..."
          done
          echo "::error::All $MAX_RETRIES push attempts failed"
          exit 1
        fi
