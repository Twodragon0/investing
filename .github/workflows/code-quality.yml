name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt ruff yamllint
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" -o /tmp/actionlint.tgz
          tar -xzf /tmp/actionlint.tgz -C /tmp
          install /tmp/actionlint /usr/local/bin/actionlint

      - name: Run ruff linter
        run: ruff check scripts/ --output-format=github

      - name: Run Python syntax check
        run: |
          find scripts/ -name "*.py" -type f -print0 | xargs -0 python -m py_compile

      - name: Run import check
        run: |
          cd scripts
          python -c "import common.config; print('✓ common.config')"
          python -c "import common.utils; print('✓ common.utils')"
          python -c "import common.dedup; print('✓ common.dedup')"
          python -c "import common.post_generator; print('✓ common.post_generator')"
          python -c "import common.image_generator; print('✓ common.image_generator')"
          python -c "import common.rss_fetcher; print('✓ common.rss_fetcher')"
          python -c "import common.summarizer; print('✓ common.summarizer')"
          python -c "import common.crypto_api; print('✓ common.crypto_api')"
          python -c "import common.formatters; print('✓ common.formatters')"

      - name: Run rendered fixture smoke check
        run: python scripts/verify_rendered_fixtures.py

      - name: Validate collector summary log contract
        run: python scripts/validate_collector_summary_contract.py

      - name: Run GitHub Actions workflow lint
        id: actionlint
        shell: bash
        run: |
          set -euo pipefail
          set +e
          actionlint -format '{{json .}}' > actionlint.ndjson
          status=$?
          set -e

          python3 - <<'PY'
          import json
          from pathlib import Path

          report = Path("actionlint.ndjson")
          summary = Path("actionlint-summary.md")
          issues = []

          if report.exists():
              for raw in report.read_text(encoding="utf-8").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  parsed = json.loads(raw)
                  if isinstance(parsed, list):
                      issues.extend(parsed)
                  else:
                      issues.append(parsed)

          lines = ["<!-- actionlint-report -->", "## actionlint report", ""]
          if issues:
              lines.append(f"- issue_count: **{len(issues)}**")
              lines.append("")
              for issue in issues[:30]:
                  path = issue.get("filepath", "")
                  line = issue.get("line", 1)
                  col = issue.get("column", 1)
                  message = issue.get("message", "actionlint issue")
                  kind = issue.get("kind", "workflow")
                  print(f"::error file={path},line={line},col={col}::[actionlint/{kind}] {message}")
                  lines.append(f"- `{path}:{line}:{col}` [{kind}] {message}")
              if len(issues) > 30:
                  lines.append(f"- ... and {len(issues) - 30} more")
          else:
              lines.append("- issue_count: **0**")
              lines.append("")
              lines.append("No actionlint issues found.")

          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"issue_count={len(issues)}")
          PY

          issue_count=$(python3 - <<'PY'
          from pathlib import Path
          import json
          count = 0
          report = Path("actionlint.ndjson")
          if report.exists():
              for raw in report.read_text(encoding="utf-8").splitlines():
                  if raw.strip():
                      parsed = json.loads(raw)
                      count += len(parsed) if isinstance(parsed, list) else 1
          print(count)
          PY
          )

          echo "issue_count=$issue_count" >> "$GITHUB_OUTPUT"
          cat actionlint-summary.md >> "$GITHUB_STEP_SUMMARY"

          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Comment actionlint report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ACTIONLINT_SUMMARY_PATH: actionlint-summary.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- actionlint-report -->';
            const body = fs.existsSync(process.env.ACTIONLINT_SUMMARY_PATH)
              ? fs.readFileSync(process.env.ACTIONLINT_SUMMARY_PATH, 'utf8')
              : `${marker}\n## actionlint report\n\nNo report generated.`;

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Run YAML lint for workflows
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable}}" .github/workflows
