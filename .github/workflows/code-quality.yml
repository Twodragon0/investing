name: Code Quality

on:
  push:
    branches: [main]
    # 수집기 자동 커밋(_state/, assets/images/generated/) 만의 변경에는 풀
    # Code Quality 실행이 의미 없음 (코드 변경 없음). 4000+ 테스트 + ruff +
    # pre-commit 풀 스위트가 매 collector 커밋마다 도는 운영 노이즈 제거.
    # _posts/** 는 Jekyll 콘텐츠 변경이므로 trigger 유지.
    paths-ignore:
      - '_state/**'
      - 'assets/images/generated/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 0'  # Weekly on Sunday at 04:00 UTC (KST 13:00, afternoon maintenance)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    # 15분: Jekyll 빌드(~5분)+테스트+스모크가 느린 러너에서 10분 벽에 부딪혀
    # 마지막 단계가 취소(The operation was canceled)되며 잡이 실패하던 문제 완화.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Setup Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a  # v1.302.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt ruff yamllint basedpyright pytest pytest-cov pytest-xdist pre-commit
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" -o /tmp/actionlint.tgz
          tar -xzf /tmp/actionlint.tgz -C /tmp
          install /tmp/actionlint /usr/local/bin/actionlint

      - name: Run pre-commit hooks
        # Enforces .pre-commit-config.yaml rules (gitleaks, relative-imports-in-scripts-common
        # for #773 regression) even when contributors skip `pre-commit install` locally.
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run ruff linter (with security rules)
        run: python3 -m ruff check scripts/ tests/ --output-format=github

      - name: Run ruff format check
        run: python3 -m ruff format --check scripts/ tests/

      - name: Run tests with coverage
        run: |
          PYTHONPATH=scripts python3 -m pytest tests/ -v --tb=short \
            --cov=scripts/common --cov-report= \
            --cov-config=pyproject.toml

      - name: Generate coverage report
        run: |
          python3 -m coverage report --fail-under=65
          python3 -m coverage html -d coverage-html
          python3 -m coverage json -o coverage.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 14

      - name: Upload coverage data for comment
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-data
          path: coverage.json
          retention-days: 1

      - name: Coverage comment on push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: py-cov-action/python-coverage-comment-action@63f52f4fbbffada6e8dee8ec432de7e01df9ba79  # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 50
          MINIMUM_ORANGE: 40
          COVERAGE_DATA_BRANCH: python-coverage-comment-action-data

      - name: Check post translation quality
        run: |
          python3 -c "
          import glob, re, sys
          errors = 0
          for f in sorted(glob.glob('_posts/2026-*.md')):
              with open(f) as fh:
                  content = fh.read()
              m = re.search(r'^description:\s*\"(.+?)\"', content, re.M)
              if not m:
                  continue
              desc = m.group(1)
              alpha = [c for c in desc if c.isalpha()]
              if not alpha:
                  continue
              en_ratio = sum(1 for c in alpha if ord(c) < 128) / len(alpha)
              if en_ratio > 0.7:
                  print(f'::warning file={f}::Description is {en_ratio:.0%} English: {desc[:80]}')
                  errors += 1
          if errors:
              print(f'::warning::{errors} post(s) have predominantly English descriptions')
          print(f'Translation quality check: {errors} issue(s) found')
          "

      - name: Check untranslated keywords in dictionary
        run: |
          python3 -c "
          import json, re, glob, os
          from collections import Counter

          dict_path = 'scripts/common/en_keyword_ko.json'
          with open(dict_path) as f:
              known = set(json.load(f).keys())

          # Scan recent posts for English keywords not in dictionary
          missing = Counter()
          for fp in sorted(glob.glob('_posts/2026-03-*.md'))[-30:]:
              with open(fp) as f:
                  body = f.read()
              for m in re.finditer(r'<strong>[^<]*긴급:\s*([^<]+?)\s*-\s*\d+건', body):
                  for word in re.split(r'[,\s]+', m.group(1)):
                      w = word.strip('.,()[]').lower()
                      if len(w) > 3 and w.isascii() and w.isalpha() and w not in known:
                          missing[w] += 1

          if missing:
              print(f'::notice::Untranslated keywords found ({len(missing)}):')
              for kw, cnt in missing.most_common(10):
                  print(f'  {kw} ({cnt}x)')
              print('Add these to scripts/common/en_keyword_ko.json')
          else:
              print('All alert keywords have translations')
          "

      - name: Run basedpyright type check
        run: python -m basedpyright

      - name: Run Python syntax check
        run: |
          find scripts/ -name "*.py" -type f -print0 | xargs -0 python -m py_compile

      - name: Run import check
        run: |
          cd scripts
          python -c "import common.config; print('✓ common.config')"
          python -c "import common.utils; print('✓ common.utils')"
          python -c "import common.dedup; print('✓ common.dedup')"
          python -c "import common.post_generator; print('✓ common.post_generator')"
          python -c "import common.image_generator; print('✓ common.image_generator')"
          python -c "import common.rss_fetcher; print('✓ common.rss_fetcher')"
          python -c "import common.summarizer; print('✓ common.summarizer')"
          python -c "import common.crypto_api; print('✓ common.crypto_api')"
          python -c "import common.formatters; print('✓ common.formatters')"
          python -c "import common.enrichment; print('✓ common.enrichment')"
          python -c "import common.translator; print('✓ common.translator')"
          python -c "import common.markdown_utils; print('✓ common.markdown_utils')"
          python -c "import common.fmp_api; print('✓ common.fmp_api')"
          python -c "import common.worldmonitor_utils; print('✓ common.worldmonitor_utils')"
          python -c "import common.collector_metrics; print('✓ common.collector_metrics')"
          python -c "import common.browser; print('✓ common.browser')"

      - name: Run pip-audit security scan
        run: |
          pip install pip-audit
          pip-audit --desc --skip-editable --ignore-vuln PYSEC-2022-252 2>&1 || echo "::warning::pip-audit found vulnerabilities (non-blocking)"

      - name: Validate time-series state files
        # signal_history.json은 signal_tracker가 자체 스키마(btc_price nullable,
        # accuracy nested)로 append-time 검증하므로 generic CLI 체크에서 제외.
        run: |
          python3 scripts/common/time_series_state.py --check _state/defi_tvl_history.json

      - name: Run rendered fixture smoke check
        run: python scripts/verify_rendered_fixtures.py

      - name: Validate collector summary log contract
        run: python scripts/validate_collector_summary_contract.py

      - name: Run Jekyll build guard
        shell: bash
        run: |
          set -euo pipefail
          bundle exec jekyll build 2>&1 | tee jekyll-build.log
          python scripts/check_jekyll_build.py jekyll-build.log

      - name: Run rendered page smoke test
        run: python scripts/smoke_test_rendered_pages.py

      - name: Check reusable workflow permission coverage
        # Prevents caller workflows from missing permissions that their reusable
        # callees require — the root cause of the 2026-04-23 collector outage
        # (alert-consecutive-failures.yml needed `actions: read` but all 13
        # collect-*.yml callers only declared `contents: write`).
        run: python3 scripts/tools/check_workflow_permissions.py --workflows-dir .github/workflows

      - name: Run GitHub Actions workflow lint
        id: actionlint
        shell: bash
        run: |
          set -euo pipefail
          set +e
          actionlint -format '{{json .}}' > actionlint.ndjson
          status=$?
          set -e

          python3 - <<'PY'
          import json
          from pathlib import Path

          report = Path("actionlint.ndjson")
          summary = Path("actionlint-summary.md")
          issues = []

          if report.exists():
              for raw in report.read_text(encoding="utf-8").splitlines():
                  raw = raw.strip()
                  if not raw:
                      continue
                  parsed = json.loads(raw)
                  if isinstance(parsed, list):
                      issues.extend(parsed)
                  else:
                      issues.append(parsed)

          lines = ["<!-- actionlint-report -->", "## actionlint report", ""]
          if issues:
              lines.append(f"- issue_count: **{len(issues)}**")
              lines.append("")
              for issue in issues[:30]:
                  path = issue.get("filepath", "")
                  line = issue.get("line", 1)
                  col = issue.get("column", 1)
                  message = issue.get("message", "actionlint issue")
                  kind = issue.get("kind", "workflow")
                  print(f"::error file={path},line={line},col={col}::[actionlint/{kind}] {message}")
                  lines.append(f"- `{path}:{line}:{col}` [{kind}] {message}")
              if len(issues) > 30:
                  lines.append(f"- ... and {len(issues) - 30} more")
          else:
              lines.append("- issue_count: **0**")
              lines.append("")
              lines.append("No actionlint issues found.")

          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"issue_count={len(issues)}")
          PY

          issue_count=$(python3 - <<'PY'
          from pathlib import Path
          import json
          count = 0
          report = Path("actionlint.ndjson")
          if report.exists():
              for raw in report.read_text(encoding="utf-8").splitlines():
                  if raw.strip():
                      parsed = json.loads(raw)
                      count += len(parsed) if isinstance(parsed, list) else 1
          print(count)
          PY
          )

          echo "issue_count=$issue_count" >> "$GITHUB_OUTPUT"
          cat actionlint-summary.md >> "$GITHUB_STEP_SUMMARY"

          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Comment actionlint report on PR
        if: always() && github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          ACTIONLINT_SUMMARY_PATH: actionlint-summary.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- actionlint-report -->';
            const body = fs.existsSync(process.env.ACTIONLINT_SUMMARY_PATH)
              ? fs.readFileSync(process.env.ACTIONLINT_SUMMARY_PATH, 'utf8')
              : `${marker}\n## actionlint report\n\nNo report generated.`;

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Run YAML lint for workflows
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, truthy: disable, document-start: disable}}" .github/workflows
