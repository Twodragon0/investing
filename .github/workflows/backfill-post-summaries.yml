name: Backfill Post Summaries

on:
  schedule:
    - cron: '15 1 * * *'  # KST 10:15 (after main collection batch completes)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Backfill post summaries
        uses: ./.github/actions/python-collect
        with:
          script: scripts/backfill_post_summaries.py
          commit-message: 'chore: backfill post summaries'
          git-add-paths: '_posts/'
