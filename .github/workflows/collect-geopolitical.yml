name: Collect Geopolitical Risk Data

on:
  schedule:
    - cron: '52 21,9 * * *'  # KST 06:52, 18:52 (early morning + afternoon)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-geopolitical
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect geopolitical risk data
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_geopolitical.py
          commit-message: 'chore: collect geopolitical risk data'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect Geopolitical Risk Data'
    secrets: inherit
