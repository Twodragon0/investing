name: Collect WorldMonitor News

on:
  schedule:
    - cron: '37 21 * * *'  # KST 06:37 (early morning, before main batch)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-worldmonitor-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect worldmonitor news
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_worldmonitor_news.py
          commit-message: 'chore: collect worldmonitor news'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect WorldMonitor News'
    secrets: inherit
