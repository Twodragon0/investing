name: Generate Daily Summary

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Generate daily summary
        uses: ./.github/actions/python-collect
        with:
          script: scripts/generate_daily_summary.py
          commit-message: 'chore: generate daily news summary'
          git-add-paths: '_posts/ assets/images/'

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Post daily summary notification to Slack
        if: steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95  # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: ":newspaper: *Daily News Summary* generated (run  #${{ github.run_number }}) — https://investing.2twodragon.com/market-analysis/"
