name: Collect Crypto News

on:
  schedule:
    - cron: '0 21,1,5,9,13,17 * * *'  # KST 06:00, 10:00, 14:00, 18:00, 22:00, 02:00 (every 4h, crypto peak hours)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-crypto-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect crypto news
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_crypto_news.py
          install-playwright: 'true'
          commit-message: 'chore: collect crypto news'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect Crypto News'
    secrets: inherit
