name: Collect Crypto News

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'  # KST 09:00, 13:00, 17:00, 21:00, 01:00, 05:00 (every 4h, crypto peak hours)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Collect crypto news
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_crypto_news.py
          commit-message: 'chore: collect crypto news'
          git-add-paths: '_posts/ _state/ assets/images/'
