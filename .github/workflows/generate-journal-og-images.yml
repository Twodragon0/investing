name: Generate Journal OG Images

on:
  push:
    branches: [main]
    paths:
      - '_posts/*trading-journal*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-journal-og-images
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate journal OG images
        run: |
          python scripts/generate_og_images.py --all --force --update-frontmatter \
            --category crypto-trading-journal \
            --category stock-trading-journal

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/images/generated/
          if git diff --staged --quiet; then
            echo "No journal OG updates to commit"
          else
            git commit -m "chore: generate journal og images $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          fi
