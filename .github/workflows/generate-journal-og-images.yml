name: Generate Journal OG Images

on:
  push:
    branches: [main]
    paths:
      - '_posts/*trading-journal*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-journal-og-images
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # R2 오프로딩 게이트: 5키가 모두 설정돼야 미러링+front matter CDN URL 활성.
      # 미설정 시 빈 값 → asset_storage.is_enabled()=False → 로컬 경로 no-op.
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install CJK fonts
        run: |
          if ! fc-list :lang=ko | grep -q .; then
            sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk >/dev/null 2>&1
          fi

      - name: Generate journal OG images
        run: |
          python scripts/generate_og_images.py --all --force --update-frontmatter \
            --category crypto-trading-journal \
            --category stock-trading-journal

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/images/generated/
          if git diff --staged --quiet; then
            echo "No journal OG updates to commit"
          else
            git commit -m "chore: generate journal og images $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          fi
