name: Ops 10AM Digest

on:
  schedule:
    - cron: "0 1 * * *"  # KST 10:00 (after collection workflows settle)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ops-10am-digest
  cancel-in-progress: false

jobs:
  post-ops-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Restore digest state cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: _state/ops-10am-digest-state.json
          key: ops-10am-digest-state-${{ github.run_id }}
          restore-keys: |
            ops-10am-digest-state-

      - name: Validate Slack config (ops)
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: ops
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_OPS: ${{ secrets.SLACK_CHANNEL_ID_OPS }}

      - name: Generate 10AM digest message
        id: digest
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SLACK_BOT_TOKEN: ${{ steps.slack.outputs.token }}
          SLACK_CHANNEL_ID: ${{ steps.slack.outputs.channel }}
        run: |
          python3 scripts/generate_ops_10am_digest.py \
            --repo "${{ github.repository }}" \
            --state-file "_state/ops-10am-digest-state.json"

      - name: Post digest to Slack
        if: steps.slack.outputs.can_post == 'true' && steps.digest.outputs.should_post == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95  # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: "${{ steps.digest.outputs.message }}"

      - name: Write summary
        run: |
          {
            echo "## Ops 10AM Digest"
            echo "- should_post: ${{ steps.digest.outputs.should_post }}"
            echo "- slack_health: ${{ steps.digest.outputs.slack_health }}"
            echo "- marker: ${{ steps.digest.outputs.marker }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save digest state cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        if: always()
        with:
          path: _state/ops-10am-digest-state.json
          key: ops-10am-digest-state-${{ github.run_id }}
