name: Weekly Digest

on:
  schedule:
    - cron: '30 1 * * 1'  # Monday KST 10:30 (after Monday morning collection batch)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Generate weekly digest
        uses: ./.github/actions/python-collect
        with:
          script: scripts/generate_weekly_digest.py
          commit-message: 'chore: generate weekly digest'
          git-add-paths: '_posts/'

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Post weekly digest notification to Slack
        if: steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: ":calendar: *Weekly Digest* generated — https://investing.2twodragon.com/market-analysis/"
