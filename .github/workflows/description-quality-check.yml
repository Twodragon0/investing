name: Description Quality Check

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
  pull_request:
    branches: [main]
    paths:
      - '_posts/**'
  workflow_run:
    workflows: ["Collect Crypto News", "Collect Stock News"]
    types: [completed]
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to check'
        default: '7'

permissions:
  contents: read

concurrency:
  group: description-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check description quality
        env:
          PYTHONPATH: scripts
        run: |
          python scripts/check_description_quality.py \
            --days ${{ inputs.days || '7' }} \
            --warn-threshold 50 \
            --format text

      - name: Post summary
        if: always()
        env:
          PYTHONPATH: scripts
        run: |
          python scripts/check_description_quality.py \
            --days ${{ inputs.days || '7' }} \
            --warn-threshold 50 \
            --format markdown >> "$GITHUB_STEP_SUMMARY"
