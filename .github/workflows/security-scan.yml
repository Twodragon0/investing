---
name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit[sarif]

      - name: Run bandit security scan
        run: |
          bandit -r scripts/ \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x scripts/verify_rendered_fixtures.py,scripts/validate_collector_summary_contract.py \
            || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run bandit (human-readable)
        run: |
          echo "## Bandit Security Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bandit -r scripts/ \
            --severity-level medium \
            --confidence-level medium \
            -x scripts/verify_rendered_fixtures.py,scripts/validate_collector_summary_contract.py \
            2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          set -euo pipefail
          gitleaks version
          gitleaks detect --source . --no-banner --verbose --redact

  actions-permissions:
    name: Workflow Permissions Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Audit workflow permissions
        run: |
          echo "## Workflow Permissions Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          has_issues=false

          for wf in .github/workflows/*.yml; do
            name=$(basename "$wf")

            # Check for overly permissive permissions (use word boundary to avoid self-match)
            if grep -qP '^permissions:\s+write-all' "$wf" 2>/dev/null; then
              echo "::warning file=$wf::Uses write-all permissions - consider restricting"
              echo "- :warning: \`$name\`: Uses \`write-all\` permissions" >> "$GITHUB_STEP_SUMMARY"
              has_issues=true
            fi

            # Check for missing permissions block (top-level only)
            if ! grep -qP '^permissions:' "$wf" 2>/dev/null; then
              echo "::warning file=$wf::Missing explicit permissions block"
              echo "- :warning: \`$name\`: Missing explicit \`permissions:\` block" >> "$GITHUB_STEP_SUMMARY"
              has_issues=true
            fi

            # Check for unpinned third-party actions (not GitHub official)
            grep -n 'uses:' "$wf" | grep -v 'actions/' | grep -v '@v' | grep -v '\./' | grep -v '#' | while read -r line; do
              echo "::warning file=$wf::Unpinned third-party action: $line"
              has_issues=true
            done
          done

          if [ "$has_issues" = false ]; then
            echo "All workflows passed permissions audit." >> "$GITHUB_STEP_SUMMARY"
          fi
