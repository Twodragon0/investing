---
name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/security-scan.yml'
      - '.gitleaks.toml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.gitleaks.toml'
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit[sarif]

      # 게이트 설계:
      #   - bandit 은 medium+ severity/confidence 에서 발견 시 exit 1.
      #   - SARIF 업로드는 항상 수행 (GitHub Security 탭에 트렌드 보존) → upload
      #     step 에 `if: always()`.
      #   - 잡 실패는 마지막 "Fail on bandit findings" step 에서 명시적으로 처리.
      #     이전: `|| true` 로 즉시 swallow → 발견되어도 잡 success → silent fail.
      - name: Run bandit security scan
        id: bandit-sarif
        continue-on-error: true
        run: |
          bandit -r scripts/ \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x scripts/verify_rendered_fixtures.py,scripts/validate_collector_summary_contract.py

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@256d634097be96e792d6764f9edaefc4320557b1  # v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run bandit (human-readable)
        id: bandit-summary
        continue-on-error: true
        run: |
          echo "## Bandit Security Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bandit -r scripts/ \
            --severity-level medium \
            --confidence-level medium \
            -x scripts/verify_rendered_fixtures.py,scripts/validate_collector_summary_contract.py \
            2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          PIPE_STATUS=("${PIPESTATUS[@]}")
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # bandit exit (PIPESTATUS[0]) 가 0 이 아니면 step outcome = failure.
          exit "${PIPE_STATUS[0]}"

      - name: Fail on bandit findings
        if: steps.bandit-sarif.outcome == 'failure' || steps.bandit-summary.outcome == 'failure'
        run: |
          echo "::error title=Bandit findings::Bandit SAST 가 medium+ 심각도 이슈를 발견했습니다. SARIF 업로드 결과를 GitHub Security 탭에서 확인하세요."
          echo "  - bandit-sarif outcome: ${{ steps.bandit-sarif.outcome }}"
          echo "  - bandit-summary outcome: ${{ steps.bandit-summary.outcome }}"
          exit 1

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        # --config 명시: gitleaks v8.24.2 는 .gitleaks.toml 을 자동 로드하지
        # 않아 명시적 경로 지정 필요. --config 없이는 _state/translation_cache.json
        # 의 linkedin-client-secret 오탐 244건이 다시 발생.
        run: |
          set -euo pipefail
          gitleaks version
          gitleaks detect --source . --config .gitleaks.toml --no-banner --verbose --redact

  actions-permissions:
    name: Workflow Permissions Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Audit workflow permissions
        run: |
          echo "## Workflow Permissions Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          has_issues=false

          for wf in .github/workflows/*.yml; do
            name=$(basename "$wf")

            # Check for overly permissive permissions (use word boundary to avoid self-match)
            if grep -qP '^permissions:\s+write-all' "$wf" 2>/dev/null; then
              echo "::warning file=$wf::Uses write-all permissions - consider restricting"
              echo "- :warning: \`$name\`: Uses \`write-all\` permissions" >> "$GITHUB_STEP_SUMMARY"
              has_issues=true
            fi

            # Check for missing permissions block (top-level only)
            if ! grep -qP '^permissions:' "$wf" 2>/dev/null; then
              echo "::warning file=$wf::Missing explicit permissions block"
              echo "- :warning: \`$name\`: Missing explicit \`permissions:\` block" >> "$GITHUB_STEP_SUMMARY"
              has_issues=true
            fi

            # Check for unpinned third-party actions (not GitHub official)
            grep -n 'uses:' "$wf" | grep -v 'actions/' | grep -v '@v' | grep -v '\./' | grep -v '#' | while read -r line; do
              echo "::warning file=$wf::Unpinned third-party action: $line"
              has_issues=true
            done
          done

          if [ "$has_issues" = false ]; then
            echo "All workflows passed permissions audit." >> "$GITHUB_STEP_SUMMARY"
          fi
