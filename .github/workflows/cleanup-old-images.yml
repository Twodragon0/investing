name: Cleanup Old Generated Images

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: cleanup-images
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove images older than 30 days
        run: |
          set -euo pipefail
          python3 <<'PY'
          import re
          from datetime import date, timedelta
          from pathlib import Path

          root = Path("assets/images/generated")
          cutoff = date.today() - timedelta(days=30)
          date_re = re.compile(r"(\d{4})-(\d{2})-(\d{2})")

          removed = 0
          skipped_no_date = 0
          for f in sorted(root.iterdir()):
              if not f.is_file() or f.suffix.lower() not in {".png", ".webp", ".avif"}:
                  continue
              m = date_re.search(f.name)
              if not m:
                  skipped_no_date += 1
                  continue
              try:
                  file_date = date(int(m.group(1)), int(m.group(2)), int(m.group(3)))
              except ValueError:
                  skipped_no_date += 1
                  continue
              if file_date < cutoff:
                  f.unlink()
                  removed += 1

          print(f"Removed {removed} old image files (>30 days, by filename date)")
          print(f"Skipped {skipped_no_date} files without parseable date in filename")
          PY

      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/images/generated/
          if git diff --cached --quiet; then
            echo "No old images to clean up"
            exit 0
          fi
          git commit -m "chore: cleanup generated images older than 30 days"
          # Push with retry — rebase if remote moved during this run
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; rebasing onto origin/main"
            git fetch origin main
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts" >&2
          exit 1
