# ⚠️ 폐지 예정 (DEPRECATION PENDING): R2 이미지 오프로딩(Phase 2) 컷오버 후 이 워크플로우는 제거된다.
# 생성 이미지를 R2로 영구 보존하면 30일 정리가 불필요해진다.
# 실제 폐지는 migrate_images_to_r2.py --apply 성공 + assets/images/generated/ gitignore 이후.
# 계획: .omc/plans/r2-phase2-gated-landing.md / 설계: docs/design-image-offloading-r2.md
#
# 🛑 SCHEDULE 비활성화 (2026-06-16): 비가역 삭제(f.unlink)가 R2 마이그레이션보다 먼저 실행되면
#    삭제된 과거 이미지는 R2로 영영 못 올라간다(migrate_images_to_r2.py가 로컬 3변형 존재를 전제).
#    R2 컷오버 전까지 자동 주간 삭제를 중단한다. 수동 실행(workflow_dispatch)은 유지.
#    재활성화: 아래 schedule 블록의 주석을 해제하면 된다.
name: Cleanup Old Generated Images

on:
  # schedule:
  #   - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC — 비활성화(위 주석 참조)
  workflow_dispatch:

concurrency:
  group: cleanup-images
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove images older than 30 days
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Cleanup attempt $attempt/3"
            python3 <<'PY'
          import re
          from datetime import date, timedelta
          from pathlib import Path

          root = Path("assets/images/generated")
          cutoff = date.today() - timedelta(days=30)
          date_re = re.compile(r"(\d{4})-(\d{2})-(\d{2})")

          removed = 0
          skipped_no_date = 0
          for f in sorted(root.iterdir()):
              if not f.is_file() or f.suffix.lower() not in {".png", ".webp", ".avif"}:
                  continue
              m = date_re.search(f.name)
              if not m:
                  skipped_no_date += 1
                  continue
              try:
                  file_date = date(int(m.group(1)), int(m.group(2)), int(m.group(3)))
              except ValueError:
                  skipped_no_date += 1
                  continue
              if file_date < cutoff:
                  f.unlink()
                  removed += 1

          print(f"Removed {removed} old image files (>30 days, by filename date)")
          print(f"Skipped {skipped_no_date} files without parseable date in filename")
          PY
            STATUS=$?
            if [ $STATUS -eq 0 ]; then
              echo "Cleanup succeeded on attempt $attempt"
              break
            fi
            echo "Cleanup failed on attempt $attempt (exit $STATUS)"
            if [ $attempt -lt 3 ]; then
              sleep 5
            else
              echo "Cleanup failed after 3 attempts" >&2
              exit 1
            fi
          done

      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/images/generated/
          if git diff --cached --quiet; then
            echo "No old images to clean up"
            exit 0
          fi
          git commit -m "chore: cleanup generated images older than 30 days"
          # Push with retry — rebase if remote moved during this run
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; rebasing onto origin/main"
            git fetch origin main
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts" >&2
          exit 1

      - name: Resolve Slack config
        id: slack
        if: failure()
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Notify Slack on failure
        if: failure() && steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: ":rotating_light: [${{ steps.slack.outputs.profile_label }}] *Cleanup Old Generated Images* failed\n\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}>"
