name: Collect Social Media

on:
  schedule:
    - cron: '7 22,4,10,16 * * *'  # KST 07:07, 13:07, 19:07, 01:07 (every 6h covering market hours)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-social-media
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect social media
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_social_media.py
          install-playwright: 'false'
          commit-message: 'chore: collect social media'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect Social Media'
      # 4회/일(6시간 주기)로 API rate limit 발생 가능성 고려해 threshold 완화
      threshold: 5
    secrets: inherit
