name: Collect Social Media

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # KST 09:00, 15:00, 21:00, 03:00 (every 6h covering market hours)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-social-media
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect social media
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_social_media.py
          install-playwright: 'false'
          commit-message: 'chore: collect social media'
          git-add-paths: '_posts/ _state/ assets/images/'
