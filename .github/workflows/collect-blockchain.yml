name: Collect Blockchain Metrics

on:
  schedule:
    - cron: '20 0 * * *'  # 09:20 KST daily (offset to avoid server cron 09:10 KST conflict)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-blockchain
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect blockchain network metrics
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_blockchain.py
          commit-message: 'chore: collect blockchain metrics'
          git-add-paths: '_posts/ _state/'
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect Blockchain Metrics'
    secrets: inherit
