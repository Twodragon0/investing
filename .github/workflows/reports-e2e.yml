name: Reports E2E Tests

on:
  push:
    branches: [main]
    paths:
      - '_layouts/reports.html'
      - 'assets/js/reports.js'
      - '_sass/components/_reports.scss'
      - 'reports-*-feed.xml'
      - 'tests/test_reports_page.py'
      - 'pages/reports.md'
      # Generated-image guard: rendered-site test must run when any image-rendering surface changes
      - '_layouts/default.html'
      - '_layouts/post.html'
      - '_includes/post-card.html'
      - '_includes/generated-picture.html'
      - '_layouts/category.html'
      - 'tests/test_generated_image_guard.py'
  pull_request:
    branches: [main]
    paths:
      - '_layouts/reports.html'
      - 'assets/js/reports.js'
      - '_sass/components/_reports.scss'
      - 'reports-*-feed.xml'
      - 'tests/test_reports_page.py'
      - 'pages/reports.md'
      # Generated-image guard: rendered-site test must run when any image-rendering surface changes
      - '_layouts/default.html'
      - '_layouts/post.html'
      - '_includes/post-card.html'
      - '_includes/generated-picture.html'
      - '_layouts/category.html'
      - 'tests/test_generated_image_guard.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reports-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af  # v1.313.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install pytest pytest-cov

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Validate RSS feeds (xmllint)
        run: |
          sudo apt-get install -y -qq libxml2-utils >/dev/null 2>&1
          for feed in _site/reports-*-feed.xml; do
            echo "Validating $feed..."
            xmllint --noout "$feed" && echo "  OK" || echo "  WARN: $feed has XML issues"
          done

      - name: Run E2E tests
        # --no-cov: these rendered-site tests don't touch scripts/ modules, so the
        # pyproject.toml global --cov-fail-under gate would always fail. Coverage is
        # enforced in the `quality` workflow which runs the full tests/ suite.
        # test_generated_image_guard.py scans the built _site for broken generated
        # <img>/<source>/og:image (regression guard for the 30-day image-pruning fix).
        run: python -m pytest tests/test_reports_page.py tests/test_generated_image_guard.py -v --no-cov
