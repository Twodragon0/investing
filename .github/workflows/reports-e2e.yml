name: Reports E2E Tests

on:
  push:
    branches: [main]
    paths:
      - '_layouts/reports.html'
      - 'assets/js/reports.js'
      - '_sass/components/_reports.scss'
      - 'reports-*-feed.xml'
      - 'tests/test_reports_page.py'
      - 'pages/reports.md'
  pull_request:
    branches: [main]
    paths:
      - '_layouts/reports.html'
      - 'assets/js/reports.js'
      - '_sass/components/_reports.scss'
      - 'reports-*-feed.xml'
      - 'tests/test_reports_page.py'
      - 'pages/reports.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reports-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a  # v1.302.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install pytest pytest-cov

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Validate RSS feeds (xmllint)
        run: |
          sudo apt-get install -y -qq libxml2-utils >/dev/null 2>&1
          for feed in _site/reports-*-feed.xml; do
            echo "Validating $feed..."
            xmllint --noout "$feed" && echo "  OK" || echo "  WARN: $feed has XML issues"
          done

      - name: Run E2E tests
        # --no-cov: reports-e2e only runs test_reports_page.py which doesn't
        # touch scripts/ modules, so the pyproject.toml global --cov-fail-under=45
        # gate would always fail. Coverage is enforced in the `quality` workflow
        # which runs the full tests/ suite.
        run: python -m pytest tests/test_reports_page.py -v --no-cov
