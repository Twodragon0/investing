name: Generate Weekly Report

on:
  workflow_dispatch:
    inputs:
      week-offset:
        description: 'How many weeks back to report (1 = previous week)'
        required: false
        default: '1'
        type: string
  schedule:
    - cron: '0 0 * * 1'  # Monday 00:00 UTC = 09:00 KST

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate weekly report
        run: |
          OFFSET="${{ github.event.inputs.week-offset || '1' }}"
          python scripts/generate_weekly_report.py --week-offset "${OFFSET}"

      - name: Lint generated script
        run: python3 -m ruff check scripts/generate_weekly_report.py

      - name: Commit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/weekly-report-*.md
          if git diff --cached --quiet; then
            echo "No new report to commit."
          else
            git commit -m "chore: generate weekly performance report"
            git push
          fi

      - name: Capture image-rejection summary for Slack payload
        id: rejection
        run: |
          ONELINER="$(python scripts/generate_weekly_report.py --slack-oneliner || true)"
          echo "oneliner=${ONELINER}" >> "$GITHUB_OUTPUT"

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Post weekly report notification to Slack
        if: steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95  # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: ":bar_chart: *Weekly Report* generated (run #${{ github.run_number }}) — https://github.com/Twodragon0/investing/tree/main/docs\n${{ steps.rejection.outputs.oneliner }}"
