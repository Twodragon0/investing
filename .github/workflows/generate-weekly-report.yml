name: Generate Weekly Report

on:
  workflow_dispatch:
    inputs:
      week-offset:
        description: 'How many weeks back to report (1 = previous week)'
        required: false
        default: '1'
        type: string
  schedule:
    - cron: '0 0 * * 1'  # Monday 00:00 UTC = 09:00 KST

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate weekly report
        run: |
          OFFSET="${{ github.event.inputs.week-offset || '1' }}"
          python scripts/generate_weekly_report.py --week-offset "${OFFSET}"

      - name: Lint generated script
        run: python3 -m ruff check scripts/generate_weekly_report.py

      - name: Commit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/weekly-report-*.md
          if git diff --cached --quiet; then
            echo "No new report to commit."
          else
            git commit -m "chore: generate weekly performance report"
            git push
          fi

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          token_candidates: |
            ${{ secrets.SLACK_BOT_TOKEN }}
            ${{ secrets.OPENCLAW_SLACK_BOT_TOKEN }}
            ${{ secrets.AI_SLACK_BOT_TOKEN }}
            ${{ secrets.SLACK_TOKEN }}
          channel_candidates_investing: |
            ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.OPENCLAW_SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_ID }}
            ${{ secrets.OPENCLAW_SLACK_CHANNEL_ID }}
            ${{ secrets.AI_SLACK_CHANNEL_ID }}
            ${{ secrets.SLACK_CHANNEL }}

      - name: Post weekly report notification to Slack
        if: steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95  # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: ":bar_chart: *Weekly Report* generated (run #${{ github.run_number }}) — https://github.com/Twodragon0/investing/tree/main/docs"
