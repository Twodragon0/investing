name: Collect FMP Calendar

on:
  schedule:
    - cron: '45 1,13 * * *'  # KST 10:45, 22:45 (twice daily, after morning collection batch)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-fmp-calendar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect FMP calendar data
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_fmp_calendar.py
          commit-message: 'chore: collect FMP calendar'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect FMP Calendar'
    secrets: inherit
