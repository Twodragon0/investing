name: Dependency Security Check

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: dependency-check
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt pip-audit

      # 게이트 설계:
      #   - pip-audit 은 발견 시 exit 1. 내부 `|| true` 는 JSON 추출이 끝까지
      #     실행되도록 유지 (그렇지 않으면 set -e 로 VULN_COUNT 계산 전 종료).
      #   - step-level `continue-on-error: true` 는 제거 → JSON 파싱 실패 같은
      #     run-block 오류는 step 실패로 즉시 표면화.
      #   - 취약점 발견 시 잡 실패는 마지막 "Fail on vulnerabilities" step 에서
      #     명시 처리. 이전: continue-on-error + || true 조합으로 step 항상
      #     success → 이슈만 만들고 CI 통과 → silent fail.
      - name: Run pip-audit
        id: audit
        run: |
          pip-audit -r scripts/requirements.txt --format=json --output=audit-report.json 2>&1 || true
          pip-audit -r scripts/requirements.txt 2>&1 | tee audit-report.txt || true

          VULN_COUNT=$(python3 -c "
          import json
          try:
              with open('audit-report.json') as f:
                  data = json.load(f)
              vulns = data.get('dependencies', [])
              count = sum(len(d.get('vulns', [])) for d in vulns)
              print(count)
          except:
              print(0)
          ")
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $VULN_COUNT vulnerabilities"

      - name: Check outdated packages
        run: pip list --outdated --format=columns 2>/dev/null || true

      - name: Create issue on vulnerabilities
        if: steps.audit.outputs.vuln_count != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let report = 'No details available';
            try {
              report = fs.readFileSync('audit-report.txt', 'utf8');
            } catch (e) {}

            const title = `🔒 Dependency Security: ${process.env.VULN_COUNT} vulnerabilities found`;
            const body = `## Dependency Security Audit\n\n` +
              `**Vulnerabilities Found**: ${process.env.VULN_COUNT}\n\n` +
              `### Details\n\`\`\`\n${report.substring(0, 3000)}\n\`\`\`\n\n` +
              `*Auto-generated by dependency-check workflow*`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security'
            });

            const existing = issues.data.find(i => i.title.includes('Dependency Security'));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'dependencies', 'automated']
              });
            }
        env:
          VULN_COUNT: ${{ steps.audit.outputs.vuln_count }}

      - name: Fail on vulnerabilities
        if: steps.audit.outputs.vuln_count != '0'
        run: |
          echo "::error title=pip-audit findings::pip-audit 가 ${{ steps.audit.outputs.vuln_count }} 건의 취약점을 발견했습니다. audit-report.txt 와 자동 생성된 이슈를 확인하세요."
          exit 1
