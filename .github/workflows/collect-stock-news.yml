name: Collect Stock News

on:
  schedule:
    - cron: '22 22,4,10,12,16 * * *'  # KST 07:22, 13:22, 19:22, 21:22, 01:22 (KR open + US pre-market + US market)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-stock-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect stock news
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_stock_news.py
          install-playwright: 'false'
          commit-message: 'chore: collect stock news'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect Stock News'
      # 5회/일로 단발 실패 발생률이 높아 threshold 완화
      threshold: 5
    secrets: inherit
