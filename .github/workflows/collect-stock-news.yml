name: Collect Stock News

on:
  schedule:
    - cron: '30 0,6,12,14,18 * * *'  # KST 09:30, 15:30, 21:30, 23:30, 03:30 (KR open + US pre-market + US market)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Collect stock news
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_stock_news.py
          install-playwright: 'true'
          commit-message: 'chore: collect stock news'
          git-add-paths: '_posts/ _state/ assets/images/'
