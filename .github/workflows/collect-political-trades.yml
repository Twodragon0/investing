name: Collect Political Trades

on:
  schedule:
    - cron: '30 22,9 * * *'  # KST 07:30, 18:30 (morning open + afternoon)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-political-trades
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect political trades
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_political_trades.py
          commit-message: 'chore: collect political trades'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect Political Trades'
    secrets: inherit
