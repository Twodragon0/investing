name: Collect CoinMarketCap Data

on:
  schedule:
    - cron: '37 */6 * * *'  # Every 6h at :37 (offset to avoid top-of-hour congestion)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-coinmarketcap
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect CoinMarketCap/CoinGecko data
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_coinmarketcap.py
          install-playwright: 'false'
          commit-message: 'chore: collect coinmarketcap data'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect CoinMarketCap Data'
      # 4회/일 (6시간 주기) — API rate limit 고려 threshold 완화
      threshold: 5
    secrets: inherit
