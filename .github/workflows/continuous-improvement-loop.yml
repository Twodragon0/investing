name: OpenClaw Hourly Improvement Loop

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: continuous-improvement
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  loop-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Time-series state dry-run check (non-blocking)
        # signal_history.json은 signal_tracker 자체 스키마로 append-time 검증됨
        continue-on-error: true
        run: |
          python3 scripts/common/time_series_state.py --fix _state/defi_tvl_history.json

      - name: Ralph loop - improve post quality
        uses: ./.github/actions/python-collect
        with:
          script: scripts/improve_existing_posts.py
          commit-message: 'chore: improve existing post quality'
          git-add-paths: '_posts/'

      - name: Ultrawork loop - backfill images
        uses: ./.github/actions/python-collect
        with:
          script: scripts/backfill_images.py
          commit-message: 'chore: backfill post images'
          git-add-paths: '_posts/ assets/images/generated/'

      - name: Run ultraworker-sisyphus loop cycle
        run: |
          python3 scripts/continuous_improvement_loop.py \
            --report-path _state/continuous-improvement-loop.md \
            --slack-path _state/continuous-improvement-loop-slack.txt \
            --role-slack-dir _state/continuous-improvement-roles

      - name: Publish loop report to job summary
        run: cat _state/continuous-improvement-loop.md >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Post loop priorities to Slack thread
        if: steps.slack.outputs.can_post == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ steps.slack.outputs.token }}
        run: |
          python3 scripts/post_loop_to_slack.py \
            --channel "${{ steps.slack.outputs.channel }}" \
            --message-path _state/continuous-improvement-loop-slack.txt \
            --marker "[ultrawork-loop]"

      - name: Resolve Slack config (ops)
        id: slack_ops
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: ops
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_OPS: ${{ secrets.SLACK_CHANNEL_ID_OPS }}

      - name: Post ops forum to Slack thread
        if: steps.slack_ops.outputs.can_post == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ steps.slack_ops.outputs.token }}
        run: |
          python3 scripts/post_loop_to_slack.py \
            --channel "${{ steps.slack_ops.outputs.channel }}" \
            --message-path _state/continuous-improvement-roles/continuous-improvement-loop-ops.txt \
            --marker "[multi-agent-forum]"

      - name: Resolve Slack config (security)
        id: slack_security
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: security
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_SECURITY: ${{ secrets.SLACK_CHANNEL_ID_SECURITY }}

      - name: Post security forum to Slack thread
        if: steps.slack_security.outputs.can_post == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ steps.slack_security.outputs.token }}
        run: |
          python3 scripts/post_loop_to_slack.py \
            --channel "${{ steps.slack_security.outputs.channel }}" \
            --message-path _state/continuous-improvement-roles/continuous-improvement-loop-security.txt \
            --marker "[multi-agent-forum]"

      - name: Resolve Slack config (dev)
        id: slack_dev
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: dev
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_DEV: ${{ secrets.SLACK_CHANNEL_ID_DEV }}

      - name: Post UI/UX forum to Slack thread
        if: steps.slack_dev.outputs.can_post == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ steps.slack_dev.outputs.token }}
        run: |
          python3 scripts/post_loop_to_slack.py \
            --channel "${{ steps.slack_dev.outputs.channel }}" \
            --message-path _state/continuous-improvement-roles/continuous-improvement-loop-uiux.txt \
            --marker "[multi-agent-forum]"
