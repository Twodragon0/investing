name: Alert on Consecutive Failures

# Reusable workflow. Posts a Slack alert when the last N runs of a given
# workflow have all failed. Invoked via `workflow_call` from collector
# workflows' on-failure job.
#
# Intended for collectors where a silent multi-day outage is costly (e.g. the
# 2026-04-21~23 risk_classifier import regression that went undetected for
# 6 days — see PR #773 / #775).

on:
  workflow_call:
    inputs:
      workflow-name:
        description: 'Display name of the caller workflow (matches its `name:` field).'
        required: true
        type: string
      threshold:
        description: 'Number of consecutive failures required to alert (default 3).'
        required: false
        type: number
        default: 3

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  check-and-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          fetch-depth: 1

      - name: Check previous run conclusions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ inputs.workflow-name }}
          THRESHOLD: ${{ inputs.threshold }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          needed=$(( THRESHOLD - 1 ))
          runs_json=$(gh run list \
            --workflow "${WORKFLOW_NAME}" \
            --limit "${THRESHOLD}" \
            --json conclusion,databaseId,createdAt,url \
            --repo "${REPO}")
          prev_failures=$(echo "$runs_json" | jq --arg id "${RUN_ID}" \
            '[.[] | select(.databaseId != ($id | tonumber)) | select(.conclusion == "failure")] | length')
          echo "prev_failures=${prev_failures}" >> "$GITHUB_OUTPUT"
          if [ "${prev_failures:-0}" -ge "${needed}" ]; then
            echo "alert=true" >> "$GITHUB_OUTPUT"
            # Build "\n"-separated bullet list of up to 5 recent failure links
            # for Slack mrkdwn (single-line output, real newlines happen in
            # Slack via the "\n" escape sequence in the JSON payload).
            recent=$(echo "$runs_json" | jq -j \
              'map(select(.conclusion == "failure")) | .[0:5]
               | map("• <\(.url)|\(.createdAt[0:16]) UTC>")
               | join("\\n")')
            echo "recent_failures=${recent}" >> "$GITHUB_OUTPUT"
          else
            echo "alert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Slack config
        if: steps.check.outputs.alert == 'true'
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Post alert to Slack
        id: post-slack
        if: steps.check.outputs.alert == 'true' && steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95  # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: ":rotating_light: [${{ steps.slack.outputs.profile_label }}] *${{ inputs.workflow-name }}* failed ${{ inputs.threshold }}+ consecutive runs\n\n*Recent failed runs:*\n${{ steps.check.outputs.recent_failures }}\n\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|:link: View current run>"

      - name: Fallback — create GitHub issue if Slack post failed
        if: >-
          steps.check.outputs.alert == 'true' &&
          (steps.slack.outputs.can_post != 'true' || steps.post-slack.outcome == 'failure')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v7
        with:
          script: |
            const title = `[alert-delivery-failed] ${{ inputs.workflow-name }} consecutive failures (Slack notify failed)`;
            const body = [
              `## Alert delivery failure`,
              ``,
              `The primary Slack alert for **${{ inputs.workflow-name }}** could not be delivered.`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Workflow | \`${{ inputs.workflow-name }}\` |`,
              `| Threshold | ${{ inputs.threshold }} consecutive failures |`,
              `| Run | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}> |`,
              `| Slack can_post | \`${{ steps.slack.outputs.can_post }}\` |`,
              `| Slack step outcome | \`${{ steps.post-slack.outcome }}\` |`,
              ``,
              `**Recent failed runs:**`,
              `${{ steps.check.outputs.recent_failures }}`,
              ``,
              `## What to investigate`,
              `- Slack token rotation: verify \`SLACK_BOT_TOKEN\` / \`SLACK_AI_BOT_TOKEN\` secrets are current`,
              `- Channel ID drift: confirm \`SLACK_CHANNEL_ID_INVESTING\` still resolves to the expected channel`,
              `- If Slack was in outage, close this issue once alerts resume`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['alert-delivery-failed', 'ops'],
            });
