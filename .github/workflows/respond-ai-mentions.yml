name: Respond AI Mentions

on:
  schedule:
    - cron: "0 * * * *"  # Hourly (was */30 — halved Actions minute usage)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: respond-ai-mentions
  cancel-in-progress: true

jobs:
  respond-mentions:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        channel_alias: [ops, dev, security, openclaw, investing]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout investing
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          fetch-depth: 1

      - name: Validate Slack config
        id: slack-config
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: ${{ matrix.channel_alias }}
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_AI_BOT_TOKEN: ${{ secrets.SLACK_AI_BOT_TOKEN }}
          SLACK_OPENCLAW_BOT_TOKEN: ${{ secrets.SLACK_OPENCLAW_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_OPS: ${{ secrets.SLACK_CHANNEL_ID_OPS }}
          SLACK_CHANNEL_ID_DEV: ${{ secrets.SLACK_CHANNEL_ID_DEV }}
          SLACK_CHANNEL_ID_SECURITY: ${{ secrets.SLACK_CHANNEL_ID_SECURITY }}
          SLACK_CHANNEL_ID_OPENCLAW: ${{ secrets.SLACK_CHANNEL_ID_OPENCLAW }}
          SLACK_CHANNEL_ID_AI: ${{ secrets.SLACK_CHANNEL_ID_AI }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Setup Python
        if: steps.slack-config.outputs.can_post == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        if: steps.slack-config.outputs.can_post == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Respond to AI mentions
        if: steps.slack-config.outputs.can_post == 'true'
        env:
          TARGET_CHANNEL_ALIAS: ${{ matrix.channel_alias }}
          SLACK_BOT_TOKEN: ${{ steps.slack-config.outputs.token }}
          SLACK_CHANNEL_ID: ${{ steps.slack-config.outputs.channel }}
        run: python3 scripts/respond_ai_mentions.py
