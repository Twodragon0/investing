name: Generate Market Summary

on:
  schedule:
    - cron: '45 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate market summary
        uses: ./.github/actions/python-collect
        with:
          script: scripts/generate_market_summary.py
          commit-message: 'chore: generate market summary'
          git-add-paths: '_posts/ assets/images/'

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          token_candidates: |
            ${{ secrets.SLACK_BOT_TOKEN }}
            ${{ secrets.OPENCLAW_SLACK_BOT_TOKEN }}
            ${{ secrets.AI_SLACK_BOT_TOKEN }}
            ${{ secrets.SLACK_TOKEN }}
          channel_candidates_investing: |
            ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.OPENCLAW_SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_ID }}
            ${{ secrets.OPENCLAW_SLACK_CHANNEL_ID }}
            ${{ secrets.AI_SLACK_CHANNEL_ID }}
            ${{ secrets.SLACK_CHANNEL }}

      - name: Post market summary notification to Slack
        if: steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: ":chart_with_upwards_trend: *Daily Market Summary* generated (run #${{ github.run_number }}) — https://investing.2twodragon.com/market-analysis/"
