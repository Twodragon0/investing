name: Collect DeFi Llama Data

on:
  schedule:
    - cron: '52 */6 * * *'  # Every 6h at :52 (offset to avoid top-of-hour congestion)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-defi-llama
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect DeFi Llama data
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_defi_llama.py
          commit-message: 'chore: collect defi llama data'
          git-add-paths: '_posts/ _state/ assets/images/'

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          bot: default
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_INVESTING: ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}

      - name: Post collection result to Slack
        if: steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: "[${{ steps.slack.outputs.profile_label }}] DeFi Llama data collection completed - ${{ github.run_id }}"

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect DeFi Llama Data'
      # 4회/일 (6시간 주기) — 일시 실패 노이즈 줄이기 위해 threshold 완화
      threshold: 5
    secrets: inherit
