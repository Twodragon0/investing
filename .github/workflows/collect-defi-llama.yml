name: Collect DeFi Llama Data

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Collect DeFi Llama data
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_defi_llama.py
          commit-message: 'chore: collect defi llama data'
          git-add-paths: '_posts/ _state/ assets/images/'

      - name: Resolve Slack config
        id: slack
        uses: ./.github/actions/resolve-slack-config
        with:
          target_channel_alias: investing
          token_candidates: |
            ${{ secrets.SLACK_BOT_TOKEN }}
            ${{ secrets.AI_SLACK_BOT_TOKEN }}
            ${{ secrets.SLACK_TOKEN }}
          channel_candidates_investing: |
            ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_ID }}
            ${{ secrets.AI_SLACK_CHANNEL_ID }}
            ${{ secrets.SLACK_CHANNEL }}

      - name: Post collection result to Slack
        if: steps.slack.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.token }}
          payload: |
            channel: "${{ steps.slack.outputs.channel }}"
            text: "[${{ steps.slack.outputs.profile_label }}] DeFi Llama data collection completed - ${{ github.run_id }}"
