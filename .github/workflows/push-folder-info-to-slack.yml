name: Push Folder Info To Slack

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push-folder-info:
    strategy:
      fail-fast: false
      matrix:
        channel_alias: [ops, dev, security, openclaw, investing]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout investing
        uses: actions/checkout@v4
        with:
          repository: Twodragon0/investing
          path: investing
          fetch-depth: 1

      - name: Build folder summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail

          build_line() {
            local repo_name="$1"
            local repo_path="$2"

            if ! git -C "$repo_path" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              printf -- "- %s: not available\n" "$repo_name"
              return
            fi

            if ! git -C "$repo_path" rev-parse --verify HEAD >/dev/null 2>&1; then
              printf -- "- %s: not available\n" "$repo_name"
              return
            fi

            local commit_hash
            local commit_date
            local tracked_files
            local top_dirs

            commit_hash=$(git -C "$repo_path" rev-parse --short HEAD)
            commit_date=$(git -C "$repo_path" log -1 --date=iso-strict --pretty=format:"%ad")
            tracked_files=$(git -C "$repo_path" ls-files | wc -l | tr -d ' ')
            top_dirs=$(git -C "$repo_path" ls-tree --name-only HEAD | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g')

            printf -- "- %s\n" "$repo_name"
            printf "  - commit: %s\n" "$commit_hash"
            printf "  - updated: %s\n" "$commit_date"
            printf "  - tracked files: %s\n" "$tracked_files"
            printf "  - top-level: %s\n" "${top_dirs:-none}"
          }

          build_investing_digest() {
            local posts_dir="investing/_posts"
            if [ ! -d "$posts_dir" ]; then
              printf -- "- latest digest: unavailable\n"
              return
            fi

            local latest_file
            latest_file=$(find "$posts_dir" -maxdepth 1 -name '*daily-news-summary*.md' 2>/dev/null | sort | tail -n 1 || true)
            if [ -z "$latest_file" ]; then
              printf -- "- latest digest: unavailable\n"
              return
            fi

            local digest_title
            local digest_excerpt
            local digest_url
            local slug
            local y
            local m
            local d
            local rest

            digest_title=$(grep -m1 '^title:' "$latest_file" | sed 's/^title:[[:space:]]*//; s/^"//; s/"$//')
            digest_excerpt=$(grep -m1 '^excerpt:' "$latest_file" | sed 's/^excerpt:[[:space:]]*//; s/^"//; s/"$//')
            digest_excerpt=$(printf "%s" "$digest_excerpt" | cut -c1-160)
            slug=$(basename "$latest_file" .md)
            y=$(printf "%s" "$slug" | cut -d'-' -f1)
            m=$(printf "%s" "$slug" | cut -d'-' -f2)
            d=$(printf "%s" "$slug" | cut -d'-' -f3)
            rest=$(printf "%s" "$slug" | cut -d'-' -f4-)
            if [ -n "$y" ] && [ -n "$m" ] && [ -n "$d" ] && [ -n "$rest" ]; then
              digest_url="https://investing.2twodragon.com/market-analysis/$y/$m/$d/$rest/"
            else
              digest_url="https://investing.2twodragon.com/"
            fi

            printf -- "- latest digest: %s\n" "$digest_title"
            if [ -n "$digest_excerpt" ]; then
              printf "  - summary: %s\n" "$digest_excerpt"
            fi
            printf "  - link: %s\n" "$digest_url"

            local wm_file
            local wm_title
            local wm_url
            local wm_slug
            wm_file=$(find "$posts_dir" -maxdepth 1 -name '*daily-worldmonitor-briefing*.md' 2>/dev/null | sort | tail -n 1 || true)
            if [ -n "$wm_file" ]; then
              wm_title=$(grep -m1 '^title:' "$wm_file" | sed 's/^title:[[:space:]]*//; s/^"//; s/"$//')
              wm_slug=$(basename "$wm_file" .md)
              y=$(printf "%s" "$wm_slug" | cut -d'-' -f1)
              m=$(printf "%s" "$wm_slug" | cut -d'-' -f2)
              d=$(printf "%s" "$wm_slug" | cut -d'-' -f3)
              rest=$(printf "%s" "$wm_slug" | cut -d'-' -f4-)
              if [ -n "$y" ] && [ -n "$m" ] && [ -n "$d" ] && [ -n "$rest" ]; then
                wm_url="https://investing.2twodragon.com/market-analysis/$y/$m/$d/$rest/"
              else
                wm_url="https://investing.2twodragon.com/"
              fi
              printf -- "- latest worldmonitor: %s\n" "$wm_title"
              printf "  - link: %s\n" "$wm_url"
            else
              printf -- "- latest worldmonitor: unavailable\n"
            fi
          }

          report_file="${RUNNER_TEMP}/folder_report.txt"
          {
            printf "*Daily folder report*\n"
            printf -- "- time (UTC): %s\n" "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            printf -- "- channels: #ops #dev #security #openclaw #investing\n"
            build_investing_digest
            build_line "ai" "ai"
            build_line "investing" "investing"
            build_line "crypto" "crypto"
          } > "$report_file"

          {
            echo "message<<EOF"
            cat "$report_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Slack config
        id: slack-config
        uses: ./investing/.github/actions/resolve-slack-config
        with:
          target_channel_alias: ${{ matrix.channel_alias }}
          token_candidates: |
            ${{ secrets.SLACK_BOT_TOKEN }}
            ${{ secrets.AI_SLACK_BOT_TOKEN }}
            ${{ secrets.SLACK_TOKEN }}
          channel_candidates_default: |
            ${{ secrets.SLACK_CHANNEL_ID }}
            ${{ secrets.AI_SLACK_CHANNEL_ID }}
            ${{ secrets.SLACK_CHANNEL }}
          channel_candidates_ops: |
            ${{ secrets.SLACK_CHANNEL_ID_OPS }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_OPS }}
            ${{ secrets.SLACK_CHANNEL_OPS }}
          channel_candidates_dev: |
            ${{ secrets.SLACK_CHANNEL_ID_DEV }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_DEV }}
            ${{ secrets.SLACK_CHANNEL_DEV }}
          channel_candidates_security: |
            ${{ secrets.SLACK_CHANNEL_ID_SECURITY }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_SECURITY }}
            ${{ secrets.SLACK_CHANNEL_SECURITY }}
          channel_candidates_openclaw: |
            ${{ secrets.SLACK_CHANNEL_ID_OPENCLAW }}
            ${{ secrets.OPENCLAW_SLACK_CHANNEL_ID_OPENCLAW }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_OPENCLAW }}
            ${{ secrets.SLACK_CHANNEL_OPENCLAW }}
            ${{ secrets.SLACK_CHANNEL_ID_AI }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_AI }}
            ${{ secrets.SLACK_CHANNEL_AI }}
          channel_candidates_investing: |
            ${{ secrets.SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.AI_SLACK_CHANNEL_ID_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_INVESTING }}
            ${{ secrets.SLACK_CHANNEL_ID }}
            ${{ secrets.AI_SLACK_CHANNEL_ID }}
            ${{ secrets.SLACK_CHANNEL }}

      - name: Post to Slack investing channel
        if: steps.slack-config.outputs.can_post == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ steps.slack-config.outputs.token }}
          payload: |
            channel: "${{ steps.slack-config.outputs.channel }}"
            text: "[${{ steps.slack-config.outputs.profile_label }}]\n${{ steps.summary.outputs.message }}"
