name: Collect Regulatory News

on:
  schedule:
    - cron: '15 22,6,12 * * *'  # KST 07:15, 15:15, 21:15 (KR open + US pre-market + US market open)
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

concurrency:
  group: collect-regulatory
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Collect regulatory news
        uses: ./.github/actions/python-collect
        with:
          script: scripts/collect_regulatory.py
          commit-message: 'chore: collect regulatory news'
          git-add-paths: '_posts/ _state/ assets/images/'

  alert-consecutive-failures:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-consecutive-failures.yml
    with:
      workflow-name: 'Collect Regulatory News'
    secrets: inherit
