name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - '_layouts/**'
      - '_sass/**'
      - 'assets/**'
      - 'pages/**'
      - 'sw.js'
      - 'manifest.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1.314.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Serve site
        run: |
          npx serve _site -l 8080 &
          sleep 3

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12
        with:
          urls: |
            http://localhost:8080/
            http://localhost:8080/reports/
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check scores
        run: |
          echo "Lighthouse audit complete. Check artifacts for detailed scores."
          echo "Target: Performance 80+, Accessibility 90+, SEO 90+, PWA partial"
