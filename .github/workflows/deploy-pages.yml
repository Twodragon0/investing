name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - '_posts/**'
      - '_layouts/**'
      - '_includes/**'
      - '_sass/**'
      - '_data/**'
      - '_config.yml'
      - '_config_ghpages.yml'
      - 'assets/**'
      - 'pages/**'
      - 'search.json'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'index.html'
      - 'index.md'
      - 'feed.xml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a  # v1.302.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Build with Jekyll
        run: bundle exec jekyll build --config _config.yml,_config_ghpages.yml
        env:
          JEKYLL_ENV: production

      - name: PurgeCSS  # 미사용 CSS 제거 (실패해도 빌드 계속)
        continue-on-error: true
        run: |
          npx --yes purgecss \
            --config purgecss.config.js \
            --css '_site/**/*.css' \
            --output _site/assets/css/ \
          && echo "PurgeCSS 완료" \
          || echo "[경고] PurgeCSS 실패 — 원본 CSS 유지"

      - name: Rendered markdown smoke test
        run: python3 scripts/verify_rendered_posts.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

  # Requires GitHub secret: GSC_SERVICE_ACCOUNT_JSON (Google service account JSON content)
  submit-sitemap:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Check GSC credentials secret
        id: gsc-check
        env:
          GSC_CREDS: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GSC_CREDS" ]; then
            echo "GSC_SERVICE_ACCOUNT_JSON secret is not configured — skipping sitemap submission."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install GSC dependencies
        if: steps.gsc-check.outputs.available == 'true'
        run: pip install google-api-python-client google-auth

      - name: Write service account credentials
        if: steps.gsc-check.outputs.available == 'true'
        env:
          GSC_CREDS: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GSC_CREDS" > /tmp/gsc-creds.json
          if ! python3 -c "import json,sys; json.load(open('/tmp/gsc-creds.json'))"; then
            echo "::warning::GSC_SERVICE_ACCOUNT_JSON is not valid JSON — sitemap submission will be skipped."
            rm -f /tmp/gsc-creds.json
            exit 0
          fi

      - name: Submit sitemap-index to Google Search Console
        if: steps.gsc-check.outputs.available == 'true' && hashFiles('/tmp/gsc-creds.json') != ''
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gsc-creds.json
          GSC_SITE_URL: https://investing.2twodragon.com/
        run: python scripts/tools/gsc_api.py submit-sitemap https://investing.2twodragon.com/sitemap-index.xml --confirm

      - name: Submit sitemap.xml to Google Search Console
        if: steps.gsc-check.outputs.available == 'true' && hashFiles('/tmp/gsc-creds.json') != ''
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gsc-creds.json
          GSC_SITE_URL: https://investing.2twodragon.com/
        run: python scripts/tools/gsc_api.py submit-sitemap https://investing.2twodragon.com/sitemap.xml --confirm
