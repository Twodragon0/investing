name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - '_posts/**'
      - '_layouts/**'
      - '_includes/**'
      - '_sass/**'
      - '_data/**'
      - '_config.yml'
      - '_config_ghpages.yml'
      - 'assets/**'
      - 'pages/**'
      - 'search.json'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'index.html'
      - 'index.md'
      - 'feed.xml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a  # v1.302.0
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '20'

      - name: Build with Jekyll
        run: bundle exec jekyll build --config _config.yml,_config_ghpages.yml
        env:
          JEKYLL_ENV: production

      - name: PurgeCSS  # 미사용 CSS 제거 (실패해도 빌드 계속)
        continue-on-error: true
        run: |
          npx --yes purgecss \
            --config purgecss.config.js \
            --css '_site/**/*.css' \
            --output _site/assets/css/ \
          && echo "PurgeCSS 완료" \
          || echo "[경고] PurgeCSS 실패 — 원본 CSS 유지"

      - name: Rendered markdown smoke test
        run: python3 scripts/verify_rendered_posts.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
