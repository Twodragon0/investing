repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: end-of-file-fixer
        # IndexNow 키 검증 파일([0-9a-f]{32}.txt)은 키 문자열 정확 매칭이 필요하므로
        # newline 추가 시 일부 검증기가 mismatch로 판단할 수 있어 exclude 처리.
        # tests/snapshots/ 골든 파일은 생성기 출력과 byte-exact 매칭이어야 하므로
        # end-of-file-fixer 가 trailing blank line 을 제거하면 골든 테스트가 깨진다.
        exclude: ^(_state/|_posts/|assets/images/generated/|docs/weekly-report-|tests/snapshots/|[0-9a-f]{32}\.txt$)
      - id: trailing-whitespace
        exclude: ^(_state/|_posts/|assets/images/generated/|docs/weekly-report-|tests/snapshots/|[0-9a-f]{32}\.txt$)
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  # ruff lint + format — CI(code-quality.yml)의 `ruff check`/`ruff format --check
  # scripts/ tests/`를 로컬 커밋 단계에서 미리 잡는다. 2026-06-10 R2 세션이 미포맷
  # 파일을 push해 Code Quality가 이틀간 silently red였던 회귀(ruff format 누락) 재발 방지.
  # rev는 로컬/CI ruff 버전(0.15.8)에 맞춤 — CI ruff가 floating이므로 버전 갱신 시 함께 올릴 것.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        name: ruff lint (scripts/ tests/)
        args: [--fix]
        files: ^(scripts/|tests/).*\.py$
      - id: ruff-format
        name: ruff format (scripts/ tests/)
        files: ^(scripts/|tests/).*\.py$

  # Enforce relative imports inside scripts/common/ to prevent
  # ModuleNotFoundError at collector execution time (regression for #773 —
  # absolute `from scripts.common.config` broke `_assess_risk_level` for 6 days).
  # Uses AST parsing to avoid false positives from docstring examples.
  # Mirrors tests/test_import_compatibility.py::test_no_absolute_scripts_imports_in_common
  # for faster local feedback before CI.
  - repo: local
    hooks:
      - id: relative-imports-in-scripts-common
        name: Enforce relative imports in scripts/common/ (regression #773)
        language: system
        entry: python scripts/tools/check_relative_imports.py
        files: ^scripts/common/.*\.py$

      # basedpyright — CI(code-quality.yml)의 `python -m basedpyright`(include=["scripts"])를
      # 로컬 커밋 단계에서 미리 잡는다. 옵셔널 import 폴백(`X = None` → reportOptionalMemberAccess)
      # 처럼 ruff/pytest 는 통과하지만 Code Quality 만 red 가 되는 회귀를 사전 차단(2026-06-26).
      # pass_filenames: false — basedpyright 는 pyproject [tool.basedpyright] include 로
      # 전체 scripts/ 패키지 컨텍스트를 검사하므로 변경 파일만 넘기면 안 된다.
      - id: basedpyright
        name: basedpyright type check (scripts/)
        language: system
        entry: python -m basedpyright
        pass_filenames: false
        files: ^scripts/.*\.py$
